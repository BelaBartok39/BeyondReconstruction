data:
  sequence_length: 1024
  sample_rate: 1000000.0
  num_train_samples: 10000
  num_val_samples: 2000
  num_test_samples: 2000
  anomaly_ratio: 0.1
  snr_range:
  - -5
  - 30
  modulations:
  - bpsk
  - qpsk
  - qam16
  anomaly_types:
  - interference
  - frequency_drift
  - amplitude_spike
  - phase_noise
model:
  type: snr_vae
  latent_dim: 32
  hidden_channels:
  - 32
  - 64
  - 128
  - 256
  kernel_size: 7
  use_batch_norm: true
  dropout: 0.1
  beta: 1.0
  snr_embedding_dim: 16
training:
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 1.0e-05
  num_epochs: 100
  early_stopping_patience: 10
  gradient_clip_norm: 1.0
  scheduler:
    type: cosine
    T_max: 100
    min_lr: 1.0e-06
continuous_learning:
  online:
    enabled: true
    learning_rate: 0.0001
    update_frequency: 1
  ewc:
    enabled: true
    lambda: 1000.0
    fisher_samples: 1000
  periodic:
    enabled: true
    interval: 1000
    epochs_per_retrain: 5
  replay:
    buffer_size: 5000
    sample_strategy: reservoir
    replay_batch_ratio: 0.5
detection:
  method: hybrid
  threshold_method: percentile
  threshold_percentile: 95
  snr_adaptive: true
  snr_bins: 7
  invert_scores: false
  hybrid_weights:
  - 0.5
  - 0.5
experiment:
  seed: 42
  device: auto
  num_workers: 4
  save_dir: checkpoints
  log_interval: 100
  checkpoint_interval: 10
