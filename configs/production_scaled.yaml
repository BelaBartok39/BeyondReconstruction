# Scaled Production Model Training
# Goal: Beat 0.95 AUROC with more data and longer training

# Data settings - 5x more training data
data:
  sequence_length: 1024
  sample_rate: 1e6
  num_train_samples: 50000     # 5x increase from 10,000
  num_val_samples: 5000        # Larger validation set
  num_test_samples: 5000       # Larger test set for better metrics
  anomaly_ratio: 0.2           # 20% anomalies in test
  snr_range: [-5, 30]
  power_range: [-20, 10]
  modulations:
    - bpsk
    - qpsk
    - qam16
  anomaly_types:
    - interference
    - frequency_drift
    - amplitude_spike
    - phase_noise
    - burst_noise
  anomaly_severity: 4.0

# Model settings - same as production
model:
  type: "snr_vae"
  latent_dim: 32
  hidden_channels: [32, 64, 128, 256]
  kernel_size: 7
  use_batch_norm: true
  dropout: 0.1
  beta: 1.0
  snr_embedding_dim: 16
  use_power_conditioning: true
  probabilistic_decoder: true
  smoothness_lambda: 0.0
  use_bayesian_encoder: false

# Training settings - extended training
training:
  batch_size: 128              # Larger batch for stability
  learning_rate: 5e-4          # Slightly lower LR for longer training
  weight_decay: 1e-5
  num_epochs: 300              # 3x increase
  early_stopping_patience: 30  # 3x more patience
  gradient_clip_norm: 1.0
  scheduler:
    type: "cosine"
    T_max: 300
    min_lr: 1e-6

# Continuous learning settings
continuous_learning:
  online:
    enabled: true
    learning_rate: 1e-4
    update_frequency: 1
  ewc:
    enabled: true
    lambda: 1000.0
    fisher_samples: 1000
  ucl:
    enabled: false
  periodic:
    enabled: true
    interval: 1000
    epochs_per_retrain: 5
  replay:
    buffer_size: 5000
    sample_strategy: "reservoir"
    replay_batch_ratio: 0.5

# Detection settings
detection:
  method: "latent"
  threshold_method: "percentile"
  threshold_percentile: 95
  snr_adaptive: true
  snr_bins: 7
  invert_scores: false
  hybrid_weights: [0.2, 0.8]
  scoring_method: "mse"

# Experiment settings
experiment:
  seed: 42
  device: "auto"
  num_workers: 4
  save_dir: "checkpoints/production_scaled"
  log_interval: 100
  checkpoint_interval: 25
